<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1068 322" role="img" aria-labelledby="logo-title logo-description">
  <title id="logo-title">ARSO Solutions Lab</title>
  <desc id="logo-description">ARSO wordmark with a blue and violet gradient ring.</desc>
  <defs>
    <linearGradient id="arso-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bc6ff"/>
      <stop offset=".38" stop-color="#2962ff"/>
      <stop offset="1" stop-color="#6c2dff"/>
    </linearGradient>
  </defs>
  <text x="0" y="224"
    fill="#080d19"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="300"
    font-weight="700"
    letter-spacing="-20"
    textLength="790"
    lengthAdjust="spacingAndGlyphs">ARS</text>
  <circle cx="922" cy="116" r="96" fill="none" stroke="url(#arso-gradient)" stroke-width="38"/>
  <text x="205" y="309"
    fill="#737477"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="49"
    font-weight="500"
    letter-spacing="13">SOLUTIONS LAB</text>
</svg>
